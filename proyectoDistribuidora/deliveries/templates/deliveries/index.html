<!DOCTYPE html>
<html>
<head><title>Confirmaciones de Entrega</title></head>
<body>
<h1>Confirmaciones de Entrega</h1>
<a href="{% url 'crear_confirmacion' %}">+ Registrar Confirmación</a>
<br><br>
<table border="1" cellpadding="4">
<tr><th>Pedido</th><th>Repartidor</th><th>Foto ID</th><th>Confirmado en</th><th>Acciones</th></tr>
{% for c in confirmaciones %}
<tr>
  <td>{{ c.order }}</td>
  <td>{{ c.delivery_user }}</td>
  <td>{{ c.photo_public_id }}</td>
  <td>{{ c.confirmed_at }}</td>
  <td>
    <a href="{% url 'editar_confirmacion' c.id %}">Editar</a> |
    <a href="{% url 'eliminar_confirmacion' c.id %}" onclick="return confirm('¿Eliminar confirmación?')">Eliminar</a>
  </td>
</tr>
{% empty %}
<tr><td colspan="5">No hay confirmaciones.</td></tr>
{% endfor %}
</table>
</body>
</html>
