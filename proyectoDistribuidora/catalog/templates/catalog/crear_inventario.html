{% extends 'base.html' %}
{% block title %}Asignar Inventario{% endblock %}
{% block content %}
<a href="{% url 'index_catalog' %}" class="text-blue-700 text-sm hover:underline mb-4 inline-block">← Volver al Catálogo</a>
<div class="bg-white border border-gray-200 rounded-lg p-6 max-w-lg">
  <h2 class="text-xl font-bold mb-2">Asignar Inventario</h2>
  <p class="text-sm text-gray-600 mb-4">
    Vendedor: <strong>{{ vendor.email }}</strong>
    <span class="ml-1 px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-600">{{ vendor.role }}</span>
  </p>
  <form method="post">
    {% csrf_token %}
    {{ formulario.as_p }}
    <div class="flex gap-3 mt-4">
      <input type="submit" value="Guardar" class="bg-blue-700 text-white px-4 py-2 rounded cursor-pointer hover:bg-blue-800">
      <a href="{% url 'index_catalog' %}" class="px-4 py-2 rounded border border-gray-300 text-gray-700 hover:bg-gray-100">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
