{% extends 'base.html' %}
{% block title %}Asignar Inventario{% endblock %}
{% block content %}
<p><a href="{% url 'index_catalog' %}">← Volver al Catálogo</a></p>
<h2>Asignar Inventario</h2>
<p>Vendedor: <strong>{{ vendor.email }}</strong> ({{ vendor.role }})</p>
<form method="post">
  {% csrf_token %}
  {{ formulario.as_p }}
  <p>
    <input type="submit" value="Guardar">
    <a href="{% url 'index_catalog' %}">Cancelar</a>
  </p>
</form>
{% endblock %}
