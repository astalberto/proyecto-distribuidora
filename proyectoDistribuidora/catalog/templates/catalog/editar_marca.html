{% extends 'base.html' %}
{% block title %}Editar Marca{% endblock %}
{% block content %}
<p><a href="{% url 'index_marcas' %}">← Volver al Catálogo</a></p>
<h2>Editar Marca: {{ marca.name }}</h2>
<form method="post">
  {% csrf_token %}
  {{ formulario.as_p }}
  <p>
    <input type="submit" value="Actualizar">
    <a href="{% url 'index_marcas' %}">Cancelar</a>
  </p>
</form>
{% endblock %}
