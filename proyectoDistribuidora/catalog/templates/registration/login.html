{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<h2>Iniciar sesión</h2>

{% if form.errors %}
  <p class="error">Correo o contraseña incorrectos. Intenta de nuevo.</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <input type="hidden" name="next" value="{{ next }}">
  <button type="submit">Ingresar</button>
</form>
{% endblock %}
