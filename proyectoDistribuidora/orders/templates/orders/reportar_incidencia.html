{% extends 'base.html' %}
{% block title %}Reportar Incidencia — Pedido #{{ pedido.id }}{% endblock %}
{% block content %}
<p><a href="{% url 'ver_pedido' pedido.id %}">← Volver al pedido</a></p>
<h2>Reportar Incidencia — Pedido #{{ pedido.id }}</h2>
<p>Tienda: <strong>{{ pedido.store }}</strong></p>
<form method="post" onsubmit="return confirm('¿Confirmas que quieres reportar un problema con este pedido?')">
  {% csrf_token %}
  {{ formulario.as_p }}
  <p>
    <input type="submit" value="Reportar problema">
    <a href="{% url 'ver_pedido' pedido.id %}">Cancelar</a>
  </p>
</form>
{% endblock %}
