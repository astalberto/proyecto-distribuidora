{% extends 'base.html' %}
{% block title %}Rechazar Pedido #{{ pedido.id }}{% endblock %}
{% block content %}
<p><a href="{% url 'ver_pedido' pedido.id %}">← Volver al pedido</a></p>
<h2>Rechazar Pedido #{{ pedido.id }}</h2>
<p>Tienda: <strong>{{ pedido.store }}</strong></p>
<form method="post" onsubmit="return confirm('¿Confirmas que quieres rechazar este pedido?')">
  {% csrf_token %}
  <label for="rejection_reason">Motivo (opcional):</label><br>
  <textarea id="rejection_reason" name="rejection_reason" maxlength="500" rows="3" cols="50"></textarea>
  <p>
    <input type="submit" value="Rechazar pedido">
    <a href="{% url 'ver_pedido' pedido.id %}">Cancelar</a>
  </p>
</form>
{% endblock %}
