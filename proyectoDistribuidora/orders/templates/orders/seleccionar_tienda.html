{% extends 'base.html' %}
{% block title %}Seleccionar Tienda{% endblock %}
{% block content %}
<h2>¿Para cuál tienda es este pedido?</h2>
<form method="post" action="{% url 'explorar_productos' %}">
  {% csrf_token %}
  <input type="hidden" name="product_id" value="{{ product_id }}">
  <input type="hidden" name="quantity" value="{{ quantity }}">
  {% for store in stores %}
  <label style="display:block;margin:0.5rem 0;">
    <input type="radio" name="store_id" value="{{ store.id }}" required>
    {{ store.name }}
  </label>
  {% endfor %}
  <br>
  <button type="submit">Continuar</button>
  <a href="{% url 'explorar_productos' %}">Cancelar</a>
</form>
{% endblock %}
