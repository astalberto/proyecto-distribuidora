{% extends 'base.html' %}
{% block title %}Crear Distribuidor{% endblock %}
{% block content %}
<p><a href="{% url 'admin:index' %}">← Volver</a></p>
<h2>Crear Distribuidor</h2>
<p>Esto crea la distribuidora y su primera cuenta de administrador (rol DISTRIBUTOR) en un solo paso.</p>
<form method="post">
  {% csrf_token %}
  {{ formulario.as_p }}
  <p>
    <input type="submit" value="Guardar">
    <a href="{% url 'admin:index' %}">Cancelar</a>
  </p>
</form>
{% endblock %}
